        .how-image img {
            width: 100%;

            aspect-ratio: 1 / 1;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto;

        /* Default desktop */
.nav-links {
  display: flex;
  list-style: none;
  gap: 30px;
}

/* Hide menu toggle on desktop */
.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

/* Mobile */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: #2a8553;
    width: 100%;
    flex-direction: column;
    align-items: center;
    display: none;
    padding: 20px 0;
  }

  .nav-links.active {
    display: flex;
  }
}
/* CONTACT SECTION */
.contact-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 60px 20px;
}

.contact-card {
  background: #f4f6f5;
  padding: 40px;
  border-radius: 20px;
  width: 100%;
  max-width: 500px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.contact-card h2 {
  text-align: center;
  margin-bottom: 25px;
  color: #462f2f;
}

.input-row {
  display: flex;
  gap: 15px;
}

.contact-card input,
.contact-card textarea {
  width: 100%;
  padding: 12px 15px;
  margin-bottom: 15px;
  border-radius: 25px;
  border: 1px solid #ccc;
  font-size: 14px;
  outline: none;
}

.contact-card textarea {
  border-radius: 15px;
  resize: none;
}

.contact-card input:focus,
.contact-card textarea:focus {
  border-color: #3d7c4b;
}

.contact-card button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: #aa6666;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.contact-card button:hover {
  background: #996767;
}

/* Responsive */
@media (max-width: 600px) {
  .input-row {
    flex-direction: column;
  }
}

.how-waves svg {
    display: block;
    width: 100%;
    height: 100px;
}

         <!-- ===== CONTACT FORM ===== -->
<div class="contact-container">
  <div class="contact-card">
    <h2>Contact Us</h2>


    <form id="contactForm">
      <div class="input-row">
        <input type="text" id="firstName" placeholder="First Name" required>
        <input type="text" id="lastName" placeholder="Last Name" required>
      </div>

      <input type="email" id="email" placeholder="Email Address" required>

      <textarea id="message" rows="5" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</div>

   

     <script>
document.getElementById("contactForm").addEventListener("submit", function(e){
  e.preventDefault();

  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const fullMessage =
    `Hello, my name is ${firstName} ${lastName}%0A` +
    `Email: ${email}%0A` +
    `Message: ${message}`;

  const phoneNumber = "YOURNUMBER"; // replace this

  window.open(`https://wa.me/${phoneNumber}?text=${fullMessage}`, "_blank");
});
</script>
